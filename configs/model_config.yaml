# AQRF Deep Learning Model Configuration

tcn:
  channels: [64, 64, 128, 128, 256]
  kernel_size: 3
  dropout: 0.2
  dilation_base: 2
  batch_size: 256
  target_vram_gb: 1.2
  learning_rate: 0.0001
  weight_decay: 0.00001
  max_grad_norm: 1.0
  direction_classes: 2

transformer:
  d_model: 128
  nhead: 8
  num_layers: 4
  dim_feedforward: 512
  dropout: 0.1
  activation: gelu
  batch_size: 128
  target_vram_gb: 1.5
  learning_rate: 0.0001
  weight_decay: 0.00001
  max_grad_norm: 1.0
  use_gradient_checkpointing: false
  direction_classes: 2

regime:
  hidden_size: 128
  num_layers: 2
  dropout: 0.2
  num_regimes: 4
  batch_size: 256
  target_vram_gb: 0.8
  learning_rate: 0.0001
  weight_decay: 0.00001
  adx_trending: 25.0
  adx_ranging: 20.0
  vol_threshold_sigma: 2.0

# Ensemble weights
tcn_weight: 0.4
transformer_weight: 0.4
regime_weight: 0.2

# Training
epochs: 100
early_stopping_patience: 15
scheduler_t0: 10

# Optimization
use_amp: true
use_8bit_adam: true
